<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KW Architects — Coastal inspiration + local expertise</title>
  <meta name="description" content="KW Architects PC — an award-winning architecture firm in Wells, Maine. 25+ years designing commercial buildings and coastal homes." />

  <!-- Fonts: Fraunces (display serif) + Inter (sans) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- ===================== NAV ===================== -->
  <header class="nav" id="nav">
    <a href="#top" class="nav__logo" aria-label="KW Architects home">
      <span class="nav__logo-mark">KW</span>
      <span class="nav__logo-word">ARCHITECTS</span>
    </a>
    <button class="nav__toggle" id="menuToggle" aria-label="Open menu" aria-expanded="false">
      <span class="nav__toggle-label">Menu</span>
      <span class="nav__toggle-bars" aria-hidden="true"><i></i><i></i></span>
    </button>
  </header>

  <!-- ===================== OVERLAY MENU ===================== -->
  <nav class="menu" id="menu" aria-hidden="true">
    <ul class="menu__list">
      <li class="menu__item"><a href="#work" data-num="01">What We Do</a></li>
      <li class="menu__item"><a href="#projects" data-num="02">Selected Projects</a></li>
      <li class="menu__item"><a href="#process" data-num="03">Process</a></li>
      <li class="menu__item"><a href="#voices" data-num="04">Voices</a></li>
      <li class="menu__item"><a href="#contact" data-num="05">Contact</a></li>
    </ul>
    <div class="menu__foot">
      <span>Wells, Maine</span>
      <span>207·332·9199</span>
    </div>
  </nav>

  <main id="top">

    <!-- ===================== 1. HERO ===================== -->
    <section class="hero" id="hero">
      <div class="hero__media" data-parallax data-speed="0.18">
        <img
          class="hero__img swap"
          src="https://images.unsplash.com/photo-1449844908441-8829872d2607?auto=format&fit=crop&w=2400&q=80"
          alt="A modern coastal home on the Maine shoreline at dusk"
          fetchpriority="high"
          onerror="this.classList.add('img--fallback')"
        />
        <div class="hero__scrim"></div>
      </div>

      <div class="hero__inner">
        <p class="hero__eyebrow reveal">Wells · Maine</p>
        <h1 class="hero__wordmark">
          <span class="reveal" data-d="1">KW</span>
          <span class="reveal" data-d="2">ARCHITECTS</span>
        </h1>
        <p class="hero__tagline reveal" data-d="3">Coastal inspiration + local expertise.</p>
      </div>

      <a href="#intro" class="hero__cue" aria-label="Scroll down">
        <span class="hero__cue-line"></span>
        <span class="hero__cue-text">Scroll</span>
      </a>
    </section>

    <!-- ===================== 2. INTRO LINE ===================== -->
    <section class="intro" id="intro">
      <p class="intro__line">
        <span class="reveal-line">For twenty-five years we have shaped</span>
        <span class="reveal-line">light, weather and shoreline into</span>
        <span class="reveal-line">homes that belong to the Maine coast.</span>
      </p>
    </section>

  </main>

  <!-- Smooth scroll + motion -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
